services:
  python-llm:
    build: ./python-llm
    ports:
      - "5000:5000"
    env_file:
      - ./python-llm/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  node-api:
    build: ./node-api
    ports:
      - "3005:3005"
    env_file:
      - ./node-api/.env
    environment:
      - PYTHON_LLM_URL=http://python-llm:5000
    volumes:
      - ./node-api/data:/app/data
    depends_on:
      python-llm:
        condition: service_healthy
